<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VGR 5 Badminton Cup 2026 - Jadwal</title>
  <meta name="theme-color" content="#d61f63" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./app-icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./app-icon.svg" />
  <link rel="stylesheet" href="./site-shell.css" />
</head>
<body>
  <div id="app"></div>
  <script src="./scraped-results.js"></script>
  <script src="./site-shell.js"></script>
  <script src="./pwa.js"></script>
  <script>
    function renderSchedulePage(payload) {
      const app = document.getElementById('app');
      const items = payload.items || [];
      const activeCat = Number((location.hash.match(/cat-(\d+)/) || [])[1]) || 16;
      const item = items.find((it) => it.cat === activeCat) || items[0];
      const days = item && item.schedule ? item.schedule : [];
      const nextMatch = window.VGRSite.findNextScheduleEntry(days);
      const nextCount = nextMatch ? window.VGRSite.formatCountdown(nextMatch.target.getTime() - Date.now()) : '--:--';
      const featuredDay = nextMatch ? nextMatch.day : null;
      window.__vgrCurrentSchedule = {
        title: item?.category || item?.label || 'Jadwal',
        days,
        nextMatch: nextMatch ? {
          date: nextMatch.day.date,
          time: nextMatch.row.time,
          a: nextMatch.row.a,
          b: nextMatch.row.b,
          targetISO: nextMatch.target.toISOString(),
        } : null,
      };

      app.innerHTML = window.VGRSite.shell({
        eyebrow: 'Jadwal Pertandingan',
        title: 'VGR 5 Badminton Cup 2026',
        subtitle: 'Halaman ini menampilkan urutan pertandingan yang akan dimainkan.',
        status: 'Aktif',
        tabs: window.VGRSite.catTabHtml(activeCat, './schedule.html'),
        actions: `
          <button class="action-btn primary" data-install-pwa hidden>Pasang Aplikasi</button>
          <button class="action-btn" data-save-calendar>Simpan Jadwal</button>
          <button class="action-btn" data-remind-next${nextMatch ? '' : ' disabled'}>Ingatkan</button>
        `,
        lead: `
          ${featuredDay ? `
            <section class="lead lead-schedule" aria-label="pertandingan berikutnya">
              <div class="lead-head">
                <div class="lead-title">Pertandingan Berikutnya</div>
                <div class="lead-tag" data-countdown-target="${nextMatch.target.toISOString()}">
                  <span class="countdown-value">${nextCount}</span>
                </div>
              </div>
              <div class="schedule-list">
                ${(featuredDay.rows || []).map((row) => `
                  <div class="schedule-row">
                    <div class="schedule-time">${row.time}</div>
                    <div class="schedule-match">
                      <div class="schedule-team schedule-left">${row.a}</div>
                      <div class="schedule-vs">vs</div>
                      <div class="schedule-team schedule-right">${row.b}</div>
                    </div>
                  </div>
                `).join('')}
              </div>
            </section>
          ` : ''}
        `,
        main: window.VGRSite.renderSchedule(days),
        note: 'Halaman ini menampilkan urutan pertandingan yang akan dimainkan.',
      });
    }
    (async () => {
      const app = document.getElementById('app');
      const activeCat = Number((location.hash.match(/cat-(\d+)/) || [])[1]) || 16;
      app.innerHTML = window.VGRSite.loadingShell({
        kind: 'schedule',
        eyebrow: 'Jadwal Pertandingan',
        title: 'VGR 5 Badminton Cup 2026',
        subtitle: 'Halaman ini menampilkan urutan pertandingan yang akan dimainkan.',
        tabs: window.VGRSite.catTabHtml(activeCat, './schedule.html'),
      });
      try {
        renderSchedulePage(await window.VGRSite.getPayload());
        window.VGRSite.startAutoRefresh(renderSchedulePage, 15000);
      } catch (err) {
        app.innerHTML = `<div class="wrap"><div class="top"><div class="eyebrow">Jadwal Pertandingan</div><h1>VGR 5 Badminton Cup 2026</h1><p class="sub">Halaman ini belum bisa dibuka.</p><div class="status-row"><div class="status">Tidak aktif</div></div></div></div>`;
      }
    })();
  </script>
</body>
</html>
